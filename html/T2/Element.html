<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block vs Inline</title>
</head>
<body>
    <!--This is a comment-->
    <div style="background-color:blueviolet;">this is 1 block element</div>
    <div style="background-color: rgb(30, 169, 125);">this is 2 block element</div>
    <span style="background-color: brown;">this is 1 inline element</span>
    <span style="background-color: rgb(168,255,29);">this is 1 inline element</span>
</body>
</html>
