<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <div>
    <h1>Ordered List</h1>
    <ol>
        <li>Apple</li>
        <li>Mango</li>
        <li>Orange</li>
    </ol>
    </div>
    <div>
    <h1>Unordered List</h1>
    <ul>
    <li>Cat</li>
    <li>Dog</li>
    <li>Rat</li>
    </ul>
    </div>
    <div>
    <h1>Descriptive List</h1>
    <dl>
        <dt>Java</dt>
        <dd>It is the programming language</dd>
        <dt>Javascript</dt>
        <dd>It is the scripting language</dd>
    </dl>
    </div>
</body>
</html>
