<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h1>Student Registration Form</h1>
        <p>
            <label><bold>Full Name:</bold></label>
            <input type="text" placeholder="Enter your full name"><br><br>

            <label><bold>Email:</bold></label>
            <input type="email" placeholder="Enter your email"><br><br>

            <label><bold>Phone Number:</bold></label>
            <input type="tel" placeholder="Enter your phone number"><br><br>

            <label><bold>Date of Birth:</bold></label>
            <input type="date" placeholder="Enter your date of birth"><br><br>

            <label><bold>Password:</bold></label>
            <input type="password" placeholder="Enter your password"><br><br>

            <label><bold>Gender:</bold></label><br>
            <input type="radio" name="gender" value="Male">
            <label>Male</label><br>
            <input type="radio" name="gender" value="Female">
            <label>Female</label><br>
            <input type="radio" name="gender" value="Other">
            <label>Other</label><br><br>

            <label><bold>Subject:</bold></label>
            <select>
                <option type="checkbox" name="Subject" value="Select your Subject">Subject</option><br>
                <option type="checkbox" name="Subject" value="HTML">HTML</option><br>
                <option type="checkbox" name="Subject" value="CSS">CSS</option><br>
                <option type="checkbox" name="Subject" value="JavaScript">JavaScript</option><br>
            </select><br><br>

            <label><bold>Semester:</bold></label>
            <select>
                <option value="Select your Semester">Semester</option><br>
                <option value="First">First</option><br>
                <option value="Second">Second</option><br>
                <option value="Third">Third</option><br>
                <option value="Fourth">Fourth</option><br>
                <option value="Fifth">Fifth</option><br>
                <option value="Sixth">Sixth</option><br>
                <option value="Seventh">Seventh</option><br>
                <option value="Eighth">Eighth</option><br>
            </select><br><br>

            <label><bold>Country:</bold></label>
            <select>
                <option value="Select your Country">Country</option><br>
                <option value="Nepal">Nepal</option><br>
                <option value="India">India</option><br>
                <option value="China">China</option><br>
            </select><br><br>

            <button type="submit">REGISTER</button>
        </p>
    </form>
</body>
</html>
