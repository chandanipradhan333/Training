<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container{
            height:100px;
            border: 2px solid black;
            display: flex;
            flex-direction: row;
            justify-content : space-between;
            align-items: center;
            gap: 20px;
            padding: 10px;
        }
    </style>
    <style>
        .text{
            width: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="color: black; background-color: aqua;">Item1</div>
        <div style="color:aliceblue; background-color:blue;">Item2</div>
        <div class="text" style="color:blueviolet; background-color:beige;">Chandani Pradhan</div>
        <div style="color:brown; background-color: beige;">Item3</div>
        <div style="color:blanchedalmond; background-color: black;">Item4</div>
    </div>
</body>
</html>
