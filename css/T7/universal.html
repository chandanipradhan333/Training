<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--Universal Selector-->
    <style>
        * {
            margin: 20px; /* It is the gap between elements */
            padding: 10px; /* It is the gap between text and its container */
        }
    </style>

</head>
<body>
    <h1 style="border: 2px solid black; padding:20px;">Hello World</h1>
</body>
</html>
