<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class selector</title>
    <style>
        /*h1
        {
            background-color: blueviolet;
        }
        p
        {
            border: 2px dotted black;
        }*/
/*-------------------------------------------------------------------------------------------------------------------*/
        /* Class Selector */
        /*
        .test
        {
            background-color: blueviolet;
            border: 2px dotted black;
        }
        */
/*-------------------------------------------------------------------------------------------------------------------*/
        /*ID Selector*/
        #title
        {
            border: 2px solid purple;
            box-shadow: 5px 5px 10px gray;
            text-align: center;
            border-radius: 10px;
            font-size: 25px;
            background-color: lightslategray;
        }
        #content
        {
            border: 2px solid black;
            box-shadow: 5px 5px 10px gray;    /*horizontal,vertical,blur,thickness*/
            text-align: center;
            border-radius: 10px;
            font-size: 20px;
            background-color: lightslategray;
            padding-top: 10px;
            padding-bottom: 10px;

        }
    </style>
</head>
<body>
    <!--In class-selector-->
    <!-----
    <h1 class="test">Hiiiiii</h1>
    <p class="test">Hellooooooooooo</p>
     ---->
<!--------------------------------------------------------------------------------------------------------------------->
    <!--ID selector-->
    <h1 id="title">Hiiiiiiiii</h1>
    <p id="content">Hellooooooooooo</p>
</body>
</html>
